name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/ThreatDemo.exe
            bin/YourRMM.exe
          generate_release_notes: true
