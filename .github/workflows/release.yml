name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build YourRMM
        run: msbuild YourRMM.csproj /nologo /v:minimal

      - name: Build ThreatDemo
        run: msbuild ThreatDemo.csproj /nologo /v:minimal

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/ThreatDemo.exe
            bin/YourRMM.exe
          generate_release_notes: true
