name: Build

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            bin/ThreatDemo.exe
            bin/YourRMM.exe
          if-no-files-found: error
